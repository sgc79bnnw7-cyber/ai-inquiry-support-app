services:
  db:
    image: postgres:16
    container_name: ai-inquiry-support-db
    environment:
      POSTGRES_USER: app_user
      POSTGRES_PASSWORD: app_password
      POSTGRES_DB: ai_inquiry_support
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app_user -d ai_inquiry_support"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
